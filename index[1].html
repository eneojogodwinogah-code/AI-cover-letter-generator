<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CoverDraft - AI Cover Letter Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { min-height: 100vh; background: #0f0f0f; color: #e8e8e8; font-family: 'DM Mono', monospace; }
    header { border-bottom: 1px solid #2a2a2a; padding: 20px 32px; display: flex; align-items: center; gap: 12px; }
    .logo-box { width: 36px; height: 36px; background: #f0c040; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .logo-text { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px; color: #fff; }
    .logo-sub { font-size: 11px; color: #666; margin-top: 1px; }
    .badge { margin-left: auto; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 20px; padding: 4px 12px; font-size: 11px; color: #f0c040; }
    main { max-width: 720px; margin: 0 auto; padding: 40px 24px; }
    .hero { text-align: center; margin-bottom: 40px; }
    .hero h1 { font-family: 'Syne', sans-serif; font-weight: 800; font-size: clamp(28px, 5vw, 42px); color: #fff; letter-spacing: -1px; line-height: 1.1; margin-bottom: 12px; }
    .hero h1 span { color: #f0c040; }
    .hero p { color: #777; font-size: 14px; line-height: 1.6; }
    label { display: block; font-size: 12px; font-weight: 500; color: #f0c040; margin-bottom: 8px; letter-spacing: 0.05em; text-transform: uppercase; }
    textarea { width: 100%; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 10px; padding: 14px 16px; color: #e8e8e8; font-family: 'DM Mono', monospace; font-size: 13px; line-height: 1.6; resize: vertical; transition: border-color 0.2s; }
    textarea:focus { outline: none; border-color: #f0c040; }
    .field { margin-bottom: 20px; }
    .error { color: #ff6b6b; font-size: 13px; padding: 10px 14px; background: #1a0f0f; border: 1px solid #3a1a1a; border-radius: 8px; margin-bottom: 16px; display: none; }
    button.generate { width: 100%; background: #f0c040; color: #0f0f0f; border: none; border-radius: 10px; padding: 16px 24px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; cursor: pointer; transition: all 0.2s; }
    button.generate:hover { background: #e0b030; transform: translateY(-1px); }
    button.generate:disabled { background: #888; cursor: not-allowed; transform: none; }
    .result { display: none; }
    .result-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
    .result-header h2 { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 22px; color: #fff; }
    .result-header p { color: #666; font-size: 12px; margin-top: 4px; }
    button.reset { background: none; border: 1px solid #2a2a2a; border-radius: 8px; color: #888; font-family: 'DM Mono', monospace; font-size: 12px; padding: 8px 14px; cursor: pointer; transition: color 0.2s; }
    button.reset:hover { color: #f0c040; }
    .letter-box { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 28px; margin-bottom: 16px; line-height: 1.8; font-size: 14px; color: #d8d8d8; white-space: pre-wrap; animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    button.copy { width: 100%; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 10px; padding: 14px; color: #e8e8e8; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; cursor: pointer; transition: all 0.2s; }
    button.copy:hover { background: #2a2a2a; }
    button.copy.copied { border-color: #2a5a2a; color: #6aff6a; background: #1a2a1a; }
    .tip { text-align: center; color: #555; font-size: 11px; margin-top: 16px; }
    .dots { display: inline-flex; gap: 3px; margin-left: 8px; }
    .dot { width: 5px; height: 5px; background: #0f0f0f; border-radius: 50%; animation: pulse 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }
  </style>
</head>
<body>
<header>
  <div class="logo-box">✉</div>
  <div>
    <div class="logo-text">CoverDraft</div>
    <div class="logo-sub">AI-powered cover letters in seconds</div>
  </div>
  <div class="badge">FREE</div>
</header>
<main>
  <div id="formSection">
    <div class="hero">
      <h1>Land the interview.<br><span>Skip the blank page.</span></h1>
      <p>Paste the job description + your background. Get a tailored cover letter instantly.</p>
    </div>
    <div class="field">
      <label>Job Description</label>
      <textarea id="jobDesc" rows="6" placeholder="Paste the full job posting here..."></textarea>
    </div>
    <div class="field">
      <label>Your Background</label>
      <textarea id="resumeInfo" rows="5" placeholder="Your name, role, years of experience, key skills, and 1-2 achievements."></textarea>
    </div>
    <div class="error" id="errorBox"></div>
    <button class="generate" id="generateBtn" onclick="generate()">✦ Generate Cover Letter</button>
  </div>
  <div class="result" id="resultSection">
    <div class="result-header">
      <div>
        <h2>Your Cover Letter ✦</h2>
        <p>Ready to copy and send</p>
      </div>
      <button class="reset" onclick="resetForm()">← Start Over</button>
    </div>
    <div class="letter-box" id="letterBox"></div>
    <button class="copy" id="copyBtn" onclick="copyLetter()">Copy to Clipboard</button>
    <p class="tip">Tip: Always personalize 1-2 sentences before sending.</p>
  </div>
</main>
<script>
  async function generate() {
    const jobDesc = document.getElementById('jobDesc').value.trim();
    const resumeInfo = document.getElementById('resumeInfo').value.trim();
    const errorBox = document.getElementById('errorBox');
    const btn = document.getElementById('generateBtn');
    if (!jobDesc || !resumeInfo) {
      errorBox.textContent = '⚠ Please fill in both fields before generating.';
      errorBox.style.display = 'block';
      return;
    }
    errorBox.style.display = 'none';
    btn.disabled = true;
    btn.innerHTML = 'Generating <span class="dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span>';
    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          messages: [{ role: 'user', content: `You are an expert cover letter writer. Write a professional, personalized cover letter.\n\nKeep it to 3 short paragraphs. Start with "Dear Hiring Manager," and end with "Sincerely, [Candidate Name]".\n\nJOB DESCRIPTION:\n${jobDesc}\n\nCANDIDATE INFO:\n${resumeInfo}\n\nWrite the cover letter now:` }]
        })
      });
      const data = await response.json();
      const text = data?.content?.[0]?.text || '';
      if (!text) throw new Error('No response');
      document.getElementById('letterBox').textContent = text;
      document.getElementById('formSection').style.display = 'none';
      document.getElementById('resultSection').style.display = 'block';
    } catch (err) {
      errorBox.textContent = '⚠ Something went wrong. Please try again.';
      errorBox.style.display = 'block';
    }
    btn.disabled = false;
    btn.innerHTML = '✦ Generate Cover Letter';
  }
  function copyLetter() {
    const text = document.getElementById('letterBox').textContent;
    navigator.clipboard.writeText(text);
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✓ Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy to Clipboard'; btn.classList.remove('copied'); }, 2000);
  }
  function resetForm() {
    document.getElementById('formSection').style.display = 'block';
    document.getElementById('resultSection').style.display = 'none';
    document.getElementById('jobDesc').value = '';
    document.getElementById('resumeInfo').value = '';
  }
</script>
</body>
</html>
